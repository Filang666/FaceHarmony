name: Face Looksmaxing CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 — база для Android/Buildozer, остальные для проверки совместимости
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        # Нужны для корректной установки OpenCV и Kivy в среде Ubuntu
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0 libgles2-mesa-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Проверка критических ошибок (синтаксис, неопределенные переменные)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Проверка стиля (PEP8) — Middle-уровень: максимум 100 символов в строке
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Validate Models Architecture
      run: |
        # Проверяем, что слои нейросетей в engine.py соединены верно и импорты работают
        python -c "from engine import PNet, MobileFaceLandmarker; \
                   pnet=PNet(); mnet=MobileFaceLandmarker(); \
                   print('Models initialized successfully!')"

    - name: Run logic tests
      run: |
        # Здесь pytest запустит тесты из папки tests/ (если ты их напишешь для математики пропорций)
        # Если тестов пока нет, просто выведем сообщение
        pytest || echo "No tests discovered yet"
