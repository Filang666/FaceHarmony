name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the Docker image
      run: |
        # Using commit SHA for a unique, traceable tag
        TAG=$(git rev-parse --short HEAD)
        docker build . --file Dockerfile --tag looksmax-ai:$TAG --tag looksmax-ai:latest

    - name: Verify Docker image
      run: |
        # Quick check to ensure the image can run and find our scripts
        docker run --rm looksmax-ai:latest ls /app/engine.py
